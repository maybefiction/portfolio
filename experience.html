<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">maybe:fiction — Experience</title>
  <meta name="description" id="page-description" content="An experience by maybe:fiction, an experience design studio." />

  <!-- Fonts: Lora (brand display serif) + Poppins (brand body sans) — self-hosted, see css/styles.css -->

  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/experience.css" />

  <link rel="icon" type="image/png" href="/assets/icons/logo.png" />
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <!-- =================== NAV =================== -->
  <header class="site-header" id="site-header">
    <nav class="nav" aria-label="Primary">
      <a href="/index.html#hero" class="nav-logo">
        <img src="/assets/icons/logo.png" alt="" class="nav-logo-icon" />
        maybe<span class="nav-logo-colon">:</span>fiction
      </a>

      <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-menu" id="nav-menu">
        <li><a href="/about.html" class="nav-link nav-link-about">About</a></li>
        <li><a href="/experiences.html" class="nav-link nav-link-experiences">Experiences</a></li>
        <li><a href="/workshops.html" class="nav-link nav-link-workshops">Workshops</a></li>
        <li><a href="/gatherings" class="nav-link nav-link-events">Gatherings</a></li>

        <li><a href="/contact.html" class="nav-link nav-link-cta">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">

    <!-- =================== SECTION 1: HERO =================== -->
    <!-- Cover photo doubles as an auto-advancing carousel across the whole
         gallery when one exists (see renderHero) — arrows/counter live here,
         title/tag/back-link stay fixed on top while slides cross-fade
         underneath. Items without a gallery fall back to a single static
         image (arrows/counter/filmstrip band simply don't render). -->
    <section class="xp-hero" id="xp-hero">
      <div class="xp-hero-track" id="xp-hero-track"><!-- slide <img>s injected by JS --></div>
      <div class="xp-hero-scrim" aria-hidden="true"></div>
      <a class="xp-back" href="/experiences.html">← All Experiences</a>
      <button class="xp-hero-arrow prev" id="xp-hero-prev" aria-label="Previous photo" hidden>‹</button>
      <button class="xp-hero-arrow next" id="xp-hero-next" aria-label="Next photo" hidden>›</button>
      <div class="xp-hero-counter" id="xp-hero-counter" hidden></div>
      <div class="xp-hero-content">
        <div class="hero-scroll-sentinel" id="hero-scroll-sentinel" aria-hidden="true"></div>
        <span class="experience-tag" id="xp-hero-tag"></span>
        <h1 class="xp-hero-title" id="xp-hero-title"></h1>
      </div>
    </section>

    <!-- Filmstrip band — sits directly beneath the cover, one line of every
         photo in the gallery so you can see what's coming and jump straight
         to it. Only rendered when there's a gallery (see renderHero). -->
    <div class="xp-hero-filmstrip-band" id="xp-hero-filmstrip-band" hidden>
      <div class="xp-hero-filmstrip" id="xp-hero-filmstrip"><!-- thumbnails injected by JS --></div>
    </div>

    <!-- =================== SECTION 2+3: BASICS/CREDITS + DESCRIPTION =================== -->
    <section class="xp-meta section-inner">
      <div class="xp-meta-grid">
        <!-- Details/Credits — capped to xp-meta-main's rendered height (see
             syncMetaHeights) and internally scrollable when Credits runs
             longer than the blurb + full description beside it. A visible
             (not just on-hover) scrollbar + bottom fade signal there's more. -->
        <aside class="xp-meta-side" id="xp-meta-side">
          <div class="xp-meta-side-inner" id="xp-meta-side-inner"><!-- Basics + Credits injected by JS --></div>
        </aside>
        <div class="xp-meta-main">
          <h2 class="xp-short-description" id="xp-short-description"></h2>
          <div class="xp-impact-stats" id="xp-impact-stats"><!-- Impact stats injected by JS, only for items with impactStats data --></div>
          <!-- Full description now flows directly beneath the blurb in the
               same column, instead of spanning full-width below the grid —
               keeps the two from drifting apart with a gap of white space
               whenever Credits (in the column beside it) runs long. -->
          <div class="xp-description" id="xp-description"></div>
        </div>
      </div>
    </section>

    <!-- =================== SECTION 4: EXPERIENCE DESIGN FLOW =================== -->
    <section class="xp-design" id="xp-design-section">
      <div class="section-inner">
        <h2 class="section-heading">Experience Design</h2>
        <div class="xp-flow" id="xp-flow"><!-- stage nodes + accordion injected by JS --></div>
      </div>
    </section>

    <!-- =================== SECTION 5: GALLERY =================== -->
    <section class="xp-gallery section-inner" id="xp-gallery-section">
      <h2 class="section-heading">Gallery</h2>
      <!-- Wraps the filter + grid so the "merged" (card-style) layout can
           give this its own white-card background/padding at the same
           inset width as .xp-design-card, without fighting .section-inner's
           own padding (which sizes the whole <section>, not this div). -->
      <div class="xp-gallery-inner" id="xp-gallery-inner">
        <!-- Only shown for items whose gallery photos are tagged per Experience
             Design element (e.g. What Clings) — hidden otherwise. -->
        <div class="filter-bar" id="xp-gallery-filter" hidden></div>
        <div class="xp-gallery-grid" id="xp-gallery-grid"><!-- thumbnails injected by JS --></div>
      </div>
    </section>

    <!-- =================== SECTION 6: STORY COLLECTION =================== -->
    <!-- Only rendered by JS for items with a storyCollection field (currently
         just When A Friend Knocks) — the fictional short stories its season
         of gatherings were built around, shown as a read-in-place accordion. -->
    <section class="xp-stories section-inner" id="xp-stories-section">
      <h2 class="section-heading">The Stories</h2>
      <div class="xp-stories-list" id="xp-stories-list"><!-- accordion injected by JS --></div>
    </section>

    <!-- Next Experience — only rendered by JS when 2+ detail pages exist -->
    <a class="xp-next" id="xp-next" href="">
      <img class="xp-next-image" id="xp-next-image" src="" alt="" />
      <div class="xp-next-scrim" aria-hidden="true"></div>
      <div class="xp-next-content">
        <span class="xp-next-label">Next Experience</span>
        <h2 class="xp-next-title" id="xp-next-title"></h2>
      </div>
    </a>

  </main>

  <!-- Lightbox for gallery -->
  <div class="xp-lightbox" id="xp-lightbox" aria-hidden="true">
    <button class="xp-lightbox-close" id="xp-lightbox-close" aria-label="Close gallery">✕</button>
    <button class="xp-lightbox-prev" id="xp-lightbox-prev" aria-label="Previous photo">‹</button>
    <img class="xp-lightbox-image" id="xp-lightbox-image" src="" alt="" />
    <button class="xp-lightbox-next" id="xp-lightbox-next" aria-label="Next photo">›</button>
  </div>

  <!-- =================== FOOTER =================== -->
  <footer class="site-footer">
    <div class="section-inner footer-inner">
      <a href="/index.html#hero" class="nav-logo footer-logo">
        <img src="/assets/icons/logo.png" alt="" class="nav-logo-icon" />
        <span class="footer-logo-word">maybe<span class="nav-logo-colon">:</span>fiction</span>
      </a>
      <ul class="footer-nav">
        <li><a href="/about.html">About</a></li>
        <li><a href="/experiences.html">Experiences</a></li>
        <li><a href="/workshops.html">Workshops</a></li>
        <li><a href="/gatherings">Gatherings</a></li>

        <li><a href="/contact.html">Contact</a></li>
      </ul>
      <p class="footer-copyright">© <span id="footer-year"></span> maybe:fiction. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/content.js"></script>
  <script src="/js/experience.js"></script>
</body>
</html>
