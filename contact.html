<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — maybe:fiction</title>
  <meta name="description" content="Get in touch with maybe:fiction, an experience design studio." />

  <!-- Google Fonts: Lora (brand display serif) + Poppins (brand body sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/css/styles.css" />

  <link rel="icon" type="image/png" href="/assets/icons/logo.png" />
</head>
<body>

  <a class="skip-link" href="#main">Skip to content</a>

  <!-- =================== NAV =================== -->
  <header class="site-header is-scrolled" id="site-header">
    <nav class="nav" aria-label="Primary">
      <a href="/index.html#hero" class="nav-logo">
        <img src="/assets/icons/logo.png" alt="" class="nav-logo-icon" />
        maybe<span class="nav-logo-colon">:</span>fiction
      </a>

      <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-menu" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-menu" id="nav-menu">
        <li><a href="/index.html#about" class="nav-link">About</a></li>
        <li><a href="/index.html#experiences" class="nav-link">Experiences</a></li>
        <li><a href="/index.html#workshops" class="nav-link">Workshops</a></li>
        <li><a href="/contact.html" class="nav-link nav-link-cta is-active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">
    <section class="contact contact-page">
      <div class="section-inner contact-inner">
        <div class="contact-intro">
          <h1 class="section-heading">Contact</h1>

          <ul class="contact-details" id="contact-details"><!-- injected by JS --></ul>
        </div>

        <form class="contact-form" id="contact-form" novalidate>
          <!--
            Placeholder form: client-side only, no backend wired up.
            To make this live, add an action/fetch call in js/contact.js
            inside the 'contact-form' submit handler (e.g. Formspree,
            Netlify Forms, or your own API endpoint).
          -->
          <div class="form-field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required />
            <span class="form-error" id="name-error"></span>
          </div>

          <div class="form-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
            <span class="form-error" id="email-error"></span>
          </div>

          <div class="form-field">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" placeholder="Tell us about your idea..." required></textarea>
            <span class="form-error" id="message-error"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="contact-submit">
            <span class="btn-label">Send it off</span>
          </button>

          <p class="form-success" id="form-success" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <!-- =================== FOOTER =================== -->
  <footer class="site-footer">
    <div class="section-inner footer-inner">
      <a href="/index.html#hero" class="nav-logo footer-logo">
        <img src="/assets/icons/logo.png" alt="" class="nav-logo-icon" />
        <span class="footer-logo-word">maybe<span class="nav-logo-colon">:</span>fiction</span>
      </a>
      <p class="footer-tagline" id="footer-tagline"></p>
      <ul class="footer-nav">
        <li><a href="/index.html#about">About</a></li>
        <li><a href="/index.html#experiences">Experiences</a></li>
        <li><a href="/index.html#workshops">Workshops</a></li>
        <li><a href="/contact.html">Contact</a></li>
      </ul>
      <p class="footer-copyright">© <span id="footer-year"></span> maybe:fiction. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/content.js"></script>
  <script src="/js/contact.js"></script>
</body>
</html>
